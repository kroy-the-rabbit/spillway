{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "spillway.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "spillway.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "spillway.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    {{- if .Values.networkPolicy.egressEnabled }}
    - Egress
    {{- end }}
  ingress:
    # Allow liveness/readiness probes from the kubelet (node IP, no label selector available)
    - ports:
        - port: 8081
          protocol: TCP
    # Allow metrics scrapes only from pods in the same namespace by default.
    - ports:
        - port: 8080
          protocol: TCP
      from:
        - podSelector: {}
{{- with .Values.networkPolicy.ingress }}
{{ toYaml . | nindent 4 }}
{{- end }}
{{- if .Values.networkPolicy.egressEnabled }}
  egress:
    {{- if .Values.networkPolicy.egress }}
    {{- toYaml .Values.networkPolicy.egress | nindent 4 }}
    {{- else }}
    # No egress rules configured — block all egress by default when egressEnabled=true.
    # Add rules in networkPolicy.egress to allow API server and DNS access.
    {{- end }}
{{- end }}
{{- end }}
