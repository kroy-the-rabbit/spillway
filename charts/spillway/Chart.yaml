  artifacthub.io/displayName: Spillway
  artifacthub.io/license: Apache-2.0
  artifacthub.io/links: |
    - name: Website
      url: https://spillway.kroy.io
    - name: Source
      url: https://github.com/kroy-the-rabbit/spillway
