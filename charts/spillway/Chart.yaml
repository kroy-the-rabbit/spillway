apiVersion: v2
name: spillway
description: >
  Replicates Kubernetes Secrets and ConfigMaps across namespaces in near real
  time using source annotations or SpillwayProfile resources.
type: application
version: 0.3.3
appVersion: "0.3.3"
keywords:
  - kubernetes
  - secrets
  - configmaps
  - replication
  - controller
icon: https://raw.githubusercontent.com/kroy-the-rabbit/spillway/main/icon.svg
home: https://spillway.kroy.io
sources:
  - https://github.com/kroy-the-rabbit/spillway
maintainers:
  - name: kroy
    email: kroy@kroy.io
annotations:
  artifacthub.io/category: security
  artifacthub.io/displayName: Spillway
  artifacthub.io/license: Apache-2.0
  artifacthub.io/links: |
    - name: Website
      url: https://spillway.kroy.io
    - name: Source
      url: https://github.com/kroy-the-rabbit/spillway
  artifacthub.io/changes: |
    - kind: changed
      description: "Extract shared reconcile logic into generic reconcileObject[T]; Secret and ConfigMap controllers no longer duplicate reconcile code"
    - kind: added
      description: "SpillwayProfile status conditions: Ready and SourcesAvailable set on each reconcile"
    - kind: fixed
      description: "ArtifactHub metadata push step is now non-blocking (continue-on-error: true)"
    - kind: fixed
      description: "accept-from annotation rewritten to support Kind/namespace/name format with per-segment wildcards"
    - kind: fixed
      description: "TTL expiry uses a 5s grace period to tolerate clock skew between nodes"
    - kind: fixed
      description: "expired-namespaces annotation is pruned of namespaces that no longer exist"
    - kind: added
      description: "Smoke tests: force-adopt, ownership conflict, namespace consent, and profile conditions"
    - kind: fixed
      description: "Profile reconciliation now enforces per-source namespace consent and refuses to overwrite unmanaged or annotation-managed targets"
    - kind: changed
      description: "The default NetworkPolicy now limits metrics ingress to same-namespace pods; extra scraper rules can be added with networkPolicy.ingress"
    - kind: changed
      description: "orphan-audit-interval is now a real controller flag and Helm value instead of dead metadata"
  artifacthub.io/maintainers: |
    - name: kroy
      email: kroy@kroy.io
