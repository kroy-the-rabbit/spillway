apiVersion: v2
name: spillway
description: >
  Replicates Kubernetes Secrets and ConfigMaps across namespaces in near real
  time using source annotations or SpillwayProfile resources.
type: application
version: 0.4.1
appVersion: "0.4.1"
keywords:
  - kubernetes
  - secrets
  - configmaps
  - replication
  - controller
icon: https://raw.githubusercontent.com/kroy-the-rabbit/spillway/main/icon.svg
home: https://spillway.kroy.io
sources:
  - https://github.com/kroy-the-rabbit/spillway
maintainers:
  - name: kroy
    email: kroy@kroy.io
annotations:
  artifacthub.io/category: security
  artifacthub.io/displayName: Spillway
  artifacthub.io/license: Apache-2.0
  artifacthub.io/links: |
    - name: Website
      url: https://spillway.kroy.io
    - name: Source
      url: https://github.com/kroy-the-rabbit/spillway
  artifacthub.io/changes: |
    - kind: security
      description: "Upgrade Go toolchain from 1.22 to 1.24; resolves CVE-2025-68121 (CRITICAL) and 5 HIGH stdlib CVEs"
    - kind: security
      description: "Upgrade golang.org/x/oauth2 v0.12.0 → v0.27.0; resolves CVE-2025-22868 (HIGH)"
    - kind: security
      description: "Upgrade golang.org/x/net v0.23.0 → v0.38.0; resolves CVE-2025-22872 and CVE-2025-22870 (MEDIUM)"
  artifacthub.io/maintainers: |
    - name: kroy
      email: kroy@kroy.io
