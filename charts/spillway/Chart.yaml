apiVersion: v2
name: spillway
description: >
  Replicates Kubernetes Secrets and ConfigMaps across namespaces in near real
  time using source annotations or SpillwayProfile resources.
type: application
version: 0.4.0
appVersion: "0.4.0"
keywords:
  - kubernetes
  - secrets
  - configmaps
  - replication
  - controller
icon: https://raw.githubusercontent.com/kroy-the-rabbit/spillway/main/icon.svg
home: https://spillway.kroy.io
sources:
  - https://github.com/kroy-the-rabbit/spillway
maintainers:
  - name: kroy
    email: kroy@kroy.io
annotations:
  artifacthub.io/category: security
  artifacthub.io/displayName: Spillway
  artifacthub.io/license: Apache-2.0
  artifacthub.io/links: |
    - name: Website
      url: https://spillway.kroy.io
    - name: Source
      url: https://github.com/kroy-the-rabbit/spillway
  artifacthub.io/changes: |
    - kind: security
      description: "Add govulncheck and Trivy filesystem scanning to CI; blocks on CRITICAL/HIGH CVEs"
    - kind: security
      description: "Add golangci-lint to CI with errcheck, staticcheck, gocritic, misspell, ineffassign, and unused linters"
    - kind: changed
      description: "Startup probe enabled by default (failureThreshold: 30, periodSeconds: 10); gives leader lease acquisition up to 5 minutes before liveness kicks in"
    - kind: changed
      description: "Pod anti-affinity enabled by default (preferred, topologyKey: kubernetes.io/hostname); spreads replicas across nodes for HA"
  artifacthub.io/maintainers: |
    - name: kroy
      email: kroy@kroy.io
