# -- Number of replicas. Leader election keeps only one active; the second
# stands by so a restart or rolling update never leaves the cluster unprotected.
replicaCount: 2

image:
  # -- Image repository
  repository: ghcr.io/kroy-the-rabbit/spillway
  # -- Image pull policy. Use Always when using mutable tags.
  pullPolicy: IfNotPresent
  # -- Image tag. Defaults to the chart's appVersion when empty.
  tag: ""

# -- Secrets used to pull the image from a private registry.
imagePullSecrets: []

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # -- Create a ServiceAccount.
  create: true
  # -- Annotations to add to the ServiceAccount (e.g. for IRSA / Workload Identity).
  annotations: {}
  # -- Override the name of the ServiceAccount. Defaults to the fullname.
  name: ""

# -- Annotations added to the controller Pod.
podAnnotations: {}

# -- Extra labels added to the controller Pod.
podLabels: {}

# -- Pod-level security context.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532
  seccompProfile:
    type: RuntimeDefault

# -- Container-level security context.
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 65532
  capabilities:
    drop: ["ALL"]

# Controller flags
controller:
  # -- Enable leader election (required when replicaCount > 1).
  leaderElect: true
  # -- Periodic full resync interval. Parsed by Go's time.ParseDuration.
  syncPeriod: 5m
  # -- Per-object self-heal fallback requeue interval. Set to 0 to disable.
  selfHealInterval: 45s
  # -- Periodic audit interval for deleting orphaned annotation-managed replicas.
  # Set to 0 to disable.
  orphanAuditInterval: 0s
  # -- When true, namespaces must explicitly opt in via the accept-from annotation
  # to receive replicas (deny-by-default consent model).
  requireNamespaceConsent: false
  # -- When true, sources may use the force-adopt annotation to overwrite
  # pre-existing unmanaged objects in target namespaces.
  allowForceAdopt: false
  # -- Comma-separated list of namespace names protected from wildcard replication.
  # Defaults to kube-system when empty.
  protectedNamespaces: ""
  # -- Comma-separated annotation key prefixes that are never copied to replicas.
  # Overrides the built-in default list when set.
  annotationDenyPrefixes: ""
  # -- Address for the Prometheus metrics endpoint.
  metricsBindAddress: ":8080"
  # -- Address for the health and readiness probe endpoints.
  healthProbeBindAddress: ":8081"

# -- Resource requests and limits for the controller container.
resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 500m
    memory: 256Mi

livenessProbe:
  httpGet:
    path: /healthz
    port: probes
  initialDelaySeconds: 15
  periodSeconds: 20
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /readyz
    port: probes
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

# -- Startup probe configuration. Gives the controller up to 5 minutes
# (failureThreshold × periodSeconds) to acquire the leader lease before the
# liveness probe kicks in. Set to {} to disable.
startupProbe:
  httpGet:
    path: /healthz
    port: probes
  failureThreshold: 30
  periodSeconds: 10

# -- Seconds the Pod is given to finish in-flight reconciliations on shutdown.
terminationGracePeriodSeconds: 10

# -- Node selector applied to the controller Pod.
nodeSelector: {}

# -- Tolerations applied to the controller Pod.
tolerations: []

# -- Affinity rules applied to the controller Pod.
# The default soft anti-affinity prefers spreading replicas across nodes for HA.
# Change to requiredDuringSchedulingIgnoredDuringExecution for hard enforcement.
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          topologyKey: kubernetes.io/hostname
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: spillway

# -- TopologySpreadConstraints for the controller Pod.
# Example for zone spread with 2 replicas:
#   - maxSkew: 1
#     topologyKey: topology.kubernetes.io/zone
#     whenUnsatisfiable: DoNotSchedule
#     labelSelector:
#       matchLabels:
#         app.kubernetes.io/name: spillway
topologySpreadConstraints: []

# -- PriorityClassName for the controller Pod.
priorityClassName: ""

metrics:
  service:
    # -- Create a ClusterIP Service exposing the metrics port.
    enabled: true
    # -- Service type.
    type: ClusterIP
    # -- Port on which metrics are served.
    port: 8080
    # -- Annotations for the metrics Service (e.g. for scrape configs).
    annotations: {}
  serviceMonitor:
    # -- Create a Prometheus Operator ServiceMonitor. Requires metrics.service.enabled.
    enabled: false
    # -- Scrape interval.
    interval: 30s
    # -- Scrape timeout.
    scrapeTimeout: 10s
    # -- Extra labels added to the ServiceMonitor (used for Prometheus selector rules).
    labels: {}
    # -- Annotations added to the ServiceMonitor.
    annotations: {}

podDisruptionBudget:
  # -- Create a PodDisruptionBudget. Enabled by default to match the default
  # replicaCount of 2 — ensures node drains and rolling updates always leave
  # at least one replica running.
  enabled: true
  # -- Minimum number of available replicas. Mutually exclusive with maxUnavailable.
  minAvailable: 1
  # maxUnavailable: 1

networkPolicy:
  # -- Create a NetworkPolicy that leaves probes reachable and limits metrics
  # ingress to pods in the same namespace by default.
  enabled: true
  # -- Extra ingress rules added to the NetworkPolicy (e.g. to allow specific scraper pods).
  ingress: []
  # -- When true, add an Egress policyType and egress rules. The controller
  # needs egress to the Kubernetes API server; set egress rules accordingly.
  # When false (default), no egress policy is applied (platform-level policies apply).
  egressEnabled: false
  # -- Egress rules. Only used when egressEnabled is true.
  # Example: allow kube-apiserver on port 6443 and DNS on port 53.
  egress: []

# -- Create the spillway-system namespace. Set to false if the namespace already exists
# or is managed externally.
createNamespace: true

# -- Install the SpillwayProfile CRD when deploying the chart.
# Set to false if you manage CRDs separately (e.g. via GitOps or a CRD-only chart).
installCRDs: true
